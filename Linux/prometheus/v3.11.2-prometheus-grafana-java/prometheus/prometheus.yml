global:
  # 默认采集间隔，所有 job 未单独配置时每 15 秒拉取一次指标。
  scrape_interval: 15s
  # 单次采集超时时间，超过该时间会把本次采集标记为失败。
  scrape_timeout: 10s
  # 规则评估间隔；当前未配置 rules，保留默认节奏即可。
  evaluation_interval: 15s

scrape_configs:
  # 采集 Prometheus 自身运行指标。
  # 用于观察 Prometheus 是否正常工作、采集耗时、规则执行等状态。
  - job_name: prometheus
    static_configs:
      - targets:
          # Prometheus 容器自身在 compose 网络中的服务名和端口。
          - prometheus:9090

  # Spring Boot Actuator + Micrometer Prometheus.
  # Java服务需要暴露 /actuator/prometheus 端点。
  # Prometheus 会从这里拉取 JVM、HTTP 请求、线程、GC、内存等应用指标。
  # 如果Java服务跑在宿主机上，把 host.docker.internal:9200 改成你的宿主机IP和端口。
  # 如果Java服务也在同一个docker compose网络里，把它改成 服务名:端口。
  - job_name: java-app
    # Spring Boot Actuator 暴露给 Prometheus 的指标路径。
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          # 本地 Docker Desktop 场景：容器通过 host.docker.internal 访问宿主机 Java 服务。
          - host.docker.internal:9200
        labels:
          # 自定义应用标签，方便 Dashboard 按应用筛选。
          application: java-app

  # 如果 /actuator/prometheus 配了 basic auth，取消下面注释并修改账号密码。
  # basic_auth:
  #   username: admin
  #   password: 123456
