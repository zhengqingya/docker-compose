server:
  http_listen_port: 0
  grpc_listen_port: 0

positions:
  filename: /etc/promtail/positions.yaml   # 游标记录上一次同步位置
  sync_period: 10s #10秒钟同步一次

clients:
  - url: http://loki:3100/api/prom/push

scrape_configs:
  - job_name: springboot-demo
    static_configs:
      - targets:
          - localhost
        labels:
          job: springboot-demo
          app: springboot-demo
          __path__: /var/logs/*log
