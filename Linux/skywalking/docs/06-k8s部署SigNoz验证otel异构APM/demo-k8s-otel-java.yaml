apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-k8s-otel-java
  namespace: signoz-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-k8s-otel-java
  template:
    metadata:
      labels:
        app: demo-k8s-otel-java
      annotations:
        instrumentation.opentelemetry.io/inject-java: "java-instrumentation"
    spec:
      containers:
        - name: app
          image: registry.cn-hangzhou.aliyuncs.com/zhengqingya/test:demo-k8s-otel-java
          imagePullPolicy: Always
          env:
            - name: server.port
              value: "666"
          ports:
            - name: http
              containerPort: 666
---
apiVersion: v1
kind: Service
metadata:
  name: demo-k8s-otel-java
  namespace: signoz-demo
spec:
  selector:
    app: demo-k8s-otel-java
  type: LoadBalancer
  ports:
    - name: http
      port: 30082
      targetPort: 666
      protocol: TCP
