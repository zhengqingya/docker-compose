apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-k8s
  namespace: k8s-otel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8s
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8s
subjects:
  - kind: ServiceAccount
    name: otel-collector-k8s
    namespace: k8s-otel
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-k8s-config
  namespace: k8s-otel
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            # 采集 kubelet 内置 cAdvisor 指标，用于补齐 Node / Pod / Container 的 CPU、内存、网络等运行资源指标。
            - job_name: kubernetes-cadvisor
              scrape_interval: 30s
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: cluster
                  replacement: local-k8s
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node

            # 自动发现 kube-state-metrics Service，采集 Namespace / Deployment / Service / Pod 等对象状态指标。
            - job_name: kube-state-metrics
              scrape_interval: 30s
              metrics_path: /metrics
              kubernetes_sd_configs:
                - role: endpoints
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
                  regex: kube-state-metrics
                  action: keep
                - action: labelmap
                  regex: __meta_kubernetes_service_label_(.+)
                - target_label: cluster
                  replacement: local-k8s

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
      batch:
      resource:
        attributes:
          - key: k8s.cluster.name
            value: local-k8s
            action: upsert

    exporters:
      otlp/skywalking:
        endpoint: host.docker.internal:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp/skywalking]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-k8s
  namespace: k8s-otel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector-k8s
  template:
    metadata:
      labels:
        app: otel-collector-k8s
    spec:
      serviceAccountName: otel-collector-k8s
      containers:
        - name: otel-collector
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.125.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: otel-collector-k8s-config
