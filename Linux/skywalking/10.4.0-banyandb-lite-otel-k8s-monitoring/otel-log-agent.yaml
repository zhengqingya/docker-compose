apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-log-agent
  namespace: skywalking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-log-agent
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-log-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-log-agent
subjects:
  - kind: ServiceAccount
    name: otel-log-agent
    namespace: skywalking
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-log-agent-config
  namespace: skywalking
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/skywalking_otel-log-agent-*/*/*.log
          - /var/log/pods/skywalking_otel-collector-*/*/*.log
          - /var/log/pods/skywalking_skywalking-oap-*/*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
          - type: json_parser
            if: body matches "^\\{"
            parse_from: body
            parse_to: attributes
          - type: move
            if: attributes["message"] != nil
            from: attributes["message"]
            to: body

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.container.name
            - k8s.node.name
          labels:
            - tag_name: app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
      transform:
        error_mode: ignore
        log_statements:
          - context: resource
            statements:
              - set(resource.attributes["service.name"], resource.attributes["app"]) where resource.attributes["service.name"] == nil and resource.attributes["app"] != nil
              - set(resource.attributes["service.name"], resource.attributes["k8s.pod.name"]) where resource.attributes["service.name"] == nil and resource.attributes["k8s.pod.name"] != nil
              - set(resource.attributes["k8s.cluster.name"], "local-k8s")
          - context: log
            statements:
              - set(log.attributes["service.name"], resource.attributes["service.name"]) where log.attributes["service.name"] == nil and resource.attributes["service.name"] != nil
              - set(log.attributes["trace_id"], log.attributes["traceid"]) where log.attributes["trace_id"] == nil and log.attributes["traceid"] != nil
      batch:
        send_batch_size: 1024
        timeout: 5s

    exporters:
      otlp/gateway:
        endpoint: otel-collector.skywalking.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, transform, batch]
          exporters: [otlp/gateway]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-log-agent
  namespace: skywalking
  labels:
    app: otel-log-agent
spec:
  selector:
    matchLabels:
      app: otel-log-agent
  template:
    metadata:
      labels:
        app: otel-log-agent
    spec:
      serviceAccountName: otel-log-agent
      containers:
        - name: otel-collector
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.125.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otelcol-contrib/config.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol-contrib/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-log-agent-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
